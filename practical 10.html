<!DOCTYPE html>
<html>
<head>
    <title>HTML Frames and Embedding</title>
</head>

<body>

    <h1 style="text-align:center;">Iframe Demo: Map & External Page</h1>

    <!-- Frame Layout using Table -->
    <table width="100%" height="500px" border="1">
        <tr>
            <!-- Left Frame: Navigation -->
            <td width="30%">
                <h3>Navigation</h3>
                <ul>
                    <li><a href="https://www.wikipedia.org" target="contentFrame">Wikipedia</a></li>
                    <li><a href="https://www.example.com" target="contentFrame">Example</a></li>
                    <li><a href="https://www.openai.com" target="contentFrame">OpenAI</a></li>
                </ul>
            </td>

            <!-- Right Frame: Content -->
            <td width="70%">
                <iframe name="contentFrame" width="100%" height="400px" style="border:none;">
                </iframe>
            </td>
        </tr>
    </table>

    <br>

    <!-- Map Section -->
    <h2>Embedded Map (Pune)</h2>
    <iframe 
        src="https://www.google.com/maps?q=Pune&output=embed"
        width="100%" 
        height="400"
        style="border:2px solid black;">
    </iframe>

</body>
</html>
